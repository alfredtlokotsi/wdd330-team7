<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Cart</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script type="module">
    import { getLocalStorage } from '/js/utils.mjs';
    
    function renderCartContents() {
      const cartItems = getLocalStorage("so-cart") || [];
      console.log("Cart items:", cartItems);
      
      const productList = document.querySelector(".product-list");
      
      if (!productList) {
        console.error("Product list element not found!");
        return;
      }
      
      if (cartItems.length === 0) {
        productList.innerHTML = '<li class="cart-card">Your cart is empty</li>';
        return;
      }
      
      const htmlItems = cartItems.map((item) => cartItemTemplate(item));
      productList.innerHTML = htmlItems.join("");
    }

    function cartItemTemplate(item) {
      return `<li class="cart-card divider">
        <a href="#" class="cart-card__image">
          <img
            src="${item.Image || '/images/placeholder.jpg'}"
            alt="${item.Name || 'Product'}"
            style="max-width: 100px;"
          />
        </a>
        <a href="#">
          <h2 class="card__name">${item.Name || 'Unknown Product'}</h2>
        </a>
        <p class="cart-card__color">${item.Colors?.[0]?.ColorName || 'N/A'}</p>
        <p class="cart-card__quantity">qty: 1</p>
        <p class="cart-card__price">$${item.FinalPrice || '0.00'}</p>
      </li>`;
    }

    // Render cart when page loads
    document.addEventListener("DOMContentLoaded", renderCartContents);
  </script>
</head>
<body>
  <header class="divider">
    <div class="logo">
      <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
      <a href="/index.html"> Sleep<span class="highlight">Outside</span></a>
    </div>
    <div class="cart">
      <a href="/cart/index.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="30" height="30">
          <!-- Your SVG path here -->
        </svg>
      </a>
    </div>
  </header>

  <main class="divider">
    <section class="products">
      <h2>My Cart</h2>
      <ul class="product-list">
        <!-- Cart items will be rendered here -->
      </ul>
    </section>
  </main>

  <footer>&copy;NOT a real business</footer>
</body>
</html>
